<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI学习助手 - 对话式学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }

        /* ========== 整体布局 ========== */
        .app { display: flex; height: 100vh; overflow: hidden; }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 260px; min-width: 260px;
            background: #1e1e2e; color: #cdd6f4;
            display: flex; flex-direction: column;
            transition: all 0.3s;
            position: relative; z-index: 20;
        }
        /* 收起状态 */
        .sidebar.closed {
            min-width: 0; width: 0;
            overflow: hidden;
        }

        .sidebar-top {
            display: flex; align-items: center;
            padding: 12px 16px; gap: 12px;
            border-bottom: 1px solid #313244;
        }
        .sidebar .hamburger {
            background: none; border: none;
            color: #cdd6f4; font-size: 22px;
            cursor: pointer; padding: 4px 8px; border-radius: 6px;
            flex-shrink: 0;
        }
        .sidebar .hamburger:hover { background: #313244; }
        .sidebar .logo { font-size: 16px; font-weight: bold; color: #cba6f7; white-space: nowrap; }

        .user-section {
            display: flex; align-items: center; gap: 12px;
            padding: 18px 16px; border-bottom: 1px solid #313244;
        }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: white; flex-shrink: 0;
        }
        .user-info .uname { font-size: 15px; font-weight: bold; color: #fff; }
        .user-info .utag { font-size: 12px; color: #a6adc8; }

        .history-section { flex: 1; overflow-y: auto; padding: 12px; }
        .history-title { font-size: 12px; color: #a6adc8; padding: 8px 4px 6px; }
        .history-item {
            padding: 10px 12px; border-radius: 8px;
            cursor: pointer; margin-bottom: 4px;
        }
        .history-item:hover { background: #313244; }
        .history-item .h-time { font-size: 11px; color: #6c7086; margin-bottom: 2px; }
        .history-item .h-text {
            font-size: 13px; color: #cdd6f4;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .sidebar-bottom { border-top: 1px solid #313244; padding: 12px 16px; }
        .btn-wrongbook {
            width: 100%; padding: 10px;
            background: #313244; color: #f38ba8;
            border: 1px solid #45475a; border-radius: 8px;
            cursor: pointer; font-size: 14px;
        }
        .btn-wrongbook:hover { background: #45475a; }
        .btn-logout {
            width: 100%; padding: 8px; background: none;
            color: #6c7086; border: none; cursor: pointer;
            font-size: 12px; margin-top: 6px;
        }
        .btn-logout:hover { color: #f38ba8; }

        /* ========== 右侧主区域 ========== */
        .main {
            flex: 1; display: flex; flex-direction: column;
            background: #f0f4f8; min-width: 0;
        }

        .topbar {
            background: white; padding: 12px 20px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-shrink: 0;
        }
        .topbar .tb-hamburger {
            display: block; background: none; border: none;
            font-size: 22px; cursor: pointer; padding: 4px 8px;
            color: #333; border-radius: 6px;
        }
        .topbar .tb-hamburger:hover { background: #f0f0f0; }
        .topbar .tb-title { font-size: 16px; font-weight: bold; color: #333; }
        .topbar .tb-subtitle { font-size: 12px; color: #999; margin-left: auto; }

        /* ========== 聊天区域 ========== */
        .chat-area {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 18px;
        }

        /* 消息气泡 */
        .msg-row { display: flex; gap: 10px; max-width: 80%; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.ai { align-self: flex-start; }
        .msg-avatar {
            width: 35px; height: 35px; border-radius: 50%;
            flex-shrink: 0; display: flex;
            align-items: center; justify-content: center; font-size: 16px;
        }
        .msg-row.user .msg-avatar { background: #667eea; color: white; }
        .msg-row.ai .msg-avatar { background: #cba6f7; color: white; }
        .msg-bubble {
            padding: 12px 16px; border-radius: 18px;
            font-size: 14px; line-height: 1.7; word-break: break-word;
        }
        .msg-row.user .msg-bubble {
            background: #667eea; color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-row.ai .msg-bubble {
            background: white; color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        /* AI消息内Markdown样式 */
        .msg-row.ai .msg-bubble h2 { color: #667eea; margin: 14px 0 8px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .msg-row.ai .msg-bubble h3 { color: #444; margin: 10px 0 6px; font-size: 15px; }
        .msg-row.ai .msg-bubble table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        .msg-row.ai .msg-bubble table th, .msg-row.ai .msg-bubble table td { border: 1px solid #ddd; padding: 7px; text-align: left; }
        .msg-row.ai .msg-bubble table th { background: #667eea; color: white; }
        .msg-row.ai .msg-bubble table tr:nth-child(even) { background: #f9f9f9; }
        .msg-row.ai .msg-bubble ul, .msg-row.ai .msg-bubble ol { padding-left: 20px; }
        .msg-row.ai .msg-bubble li { margin: 3px 0; }
        .msg-row.ai .msg-bubble pre { background: #282c34; color: #abb2bf; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; font-size: 13px; }
        .msg-row.ai .msg-bubble code { background: #f0f0f0; padding: 2px 5px; border-radius: 4px; font-size: 13px; }
        .msg-row.ai .msg-bubble pre code { background: none; padding: 0; }
        .msg-row.ai .msg-bubble hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
        .msg-row.ai .msg-bubble strong { color: #333; }

        /* 标签切换 */
        .tabs-inline { display: flex; gap: 6px; margin: 10px 0; flex-wrap: wrap; }
        .tabs-inline button {
            padding: 6px 14px; border: 1.5px solid #667eea;
            background: white; color: #667eea;
            border-radius: 16px; cursor: pointer;
            font-size: 12px; font-weight: bold;
            transition: all 0.2s;
        }
        .tabs-inline button:hover { background: #f0f0ff; }
        .tabs-inline button.active { background: #667eea; color: white; }
        .tab-section { display: none; margin-top: 8px; }
        .tab-section.active { display: block; }

        /* 打字动画 */
        .typing-dots { display: flex; gap: 4px; padding: 8px 0; }
        .typing-dots span {
            width: 7px; height: 7px; background: #999;
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-7px); }
        }

        /* 输入区 */
        .input-area {
            background: white; padding: 14px 20px;
            display: flex; gap: 10px; align-items: center;
            box-shadow: 0 -1px 4px rgba(0,0,0,0.06); flex-shrink: 0;
        }
        .input-area input {
            flex: 1; padding: 10px 16px;
            border: 2px solid #e0e0e0; border-radius: 24px;
            font-size: 14px;
        }
        .input-area input:focus { outline: none; border-color: #667eea; }
        .input-area button {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; font-size: 18px;
            cursor: pointer; flex-shrink: 0;
        }
        .input-area button:hover { transform: scale(1.08); }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* ========== 个人资料弹窗 ========== */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-card {
            background: white; border-radius: 16px;
            padding: 30px; width: 380px; max-width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-card .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px;
        }
        .modal-card .modal-header h3 { font-size: 18px; color: #333; }
        .modal-card .modal-close {
            background: none; border: none; font-size: 24px;
            cursor: pointer; color: #999;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-card .modal-close:hover { background: #f0f0f0; color: #333; }
        .modal-avatar-lg {
            width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; margin: 0 auto 16px;
        }
        .modal-info-row {
            display: flex; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .modal-info-row .info-label { color: #999; }
        .modal-info-row .info-value { color: #333; font-weight: bold; }
        .modal-card .btn-changepw {
            width: 100%; padding: 11px; margin-top: 20px;
            background: #f0f0ff; color: #667eea;
            border: 1px solid #667eea; border-radius: 8px;
            cursor: pointer; font-size: 14px; font-weight: bold;
        }
        .modal-card .btn-changepw:hover { background: #667eea; color: white; }

        /* 用户区点击 */
        .user-section { cursor: pointer; }
        .user-section:hover { background: rgba(255,255,255,0.05); }

        /* ========== 错题集视图 ========== */
        .wrongbook-view {
            flex: 1; overflow-y: auto; padding: 24px;
            display: none;
        }
        .wrongbook-view.show { display: block; }
        .wrongbook-view h2 { color: #333; margin-bottom: 20px; font-size: 20px; }
        .wrongbook-view .wb-controls {
            display: flex; gap: 12px; margin-bottom: 16px;
            flex-wrap: wrap; align-items: center;
        }
        .wrongbook-view .wb-controls select {
            padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 14px; background: white;
        }
        .wrongbook-view .wb-controls input {
            flex: 1; min-width: 120px; padding: 10px 14px;
            border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;
        }
        .wrongbook-view .wb-controls button {
            padding: 10px 20px; border-radius: 8px; border: none;
            font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .wrongbook-view textarea {
            width: 100%; height: 160px; padding: 14px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 14px; resize: vertical; line-height: 1.6;
        }
        .wrongbook-view textarea:focus { outline: none; border-color: #667eea; }
        .quiz-card {
            background: white; border-radius: 12px; padding: 18px 20px;
            margin: 12px 0; box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            border-left: 4px solid #667eea;
        }
        .quiz-card .q-title { font-weight: bold; color: #333; margin-bottom: 6px; }
        .quiz-card .q-answer { color: #666; font-size: 13px; margin-bottom: 10px; }
        .btn-sm {
            padding: 6px 16px; border-radius: 16px; border: none;
            font-size: 12px; cursor: pointer; font-weight: bold;
        }
        .btn-save { background: #667eea; color: white; }
        .btn-save:hover { background: #5568d3; }
        .btn-delete { background: #fff0f0; color: #d32f2f; border: 1px solid #ffcdd2; }
        .btn-delete:hover { background: #ffe0e0; }
        .btn-quiz {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; padding: 10px 28px;
        }
        .btn-quiz:hover { opacity: 0.9; }
        .btn-quiz:disabled { background: #ccc; cursor: not-allowed; }
        .saved-list { margin-top: 24px; }
        .saved-list h3 { color: #333; margin-bottom: 12px; font-size: 17px; }

        /* ========== 学习统计 ========== */
        .stats-section {
            border-top: 1px solid #313244;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .stats-section:hover { background: rgba(255,255,255,0.04); }
        .stats-section .today-label { font-size: 11px; color: #a6adc8; margin-bottom: 4px; }
        .stats-section .today-time { font-size: 20px; font-weight: bold; color: #a6e3a1; }
        .stats-section .today-time span { font-size: 12px; color: #a6adc8; }

        /* 7天图表弹窗 */
        .chart-modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
            align-items: center; justify-content: center;
        }
        .chart-modal.show { display: flex; }
        .chart-card {
            background: white; border-radius: 16px;
            padding: 24px 28px; width: 420px; max-width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }
        .chart-card h3 { color: #333; margin-bottom: 16px; font-size: 17px; text-align: center; }
        .chart-bars { display: flex; align-items: flex-end; gap: 10px; height: 150px; padding: 0 10px; }
        .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .chart-bar {
            width: 100%; max-width: 40px; min-height: 4px;
            background: linear-gradient(180deg, #667eea, #764ba2);
            border-radius: 6px 6px 0 0; transition: height 0.4s ease;
        }
        .chart-bar.zero { background: #e0e0e0; }
        .chart-label { font-size: 10px; color: #999; margin-top: 6px; }
        .chart-count { font-size: 11px; color: #667eea; font-weight: bold; margin-bottom: 4px; }
        .chart-close {
            display: block; margin: 16px auto 0; padding: 8px 30px;
            background: #667eea; color: white; border: none;
            border-radius: 20px; cursor: pointer; font-size: 13px;
        }
        .chart-close:hover { opacity: 0.9; }

        /* ========== 语音通话弹窗 ========== */
        .voice-modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 100;
            align-items: center; justify-content: center;
        }
        .voice-modal.show { display: flex; }
        .voice-card {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 24px; padding: 30px; width: 380px; max-width: 90%;
            text-align: center; color: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            position: relative;
        }
        .voice-close {
            position: absolute; top: 14px; right: 18px;
            background: rgba(255,255,255,0.1); border: none;
            color: white; font-size: 18px; width: 32px; height: 32px;
            border-radius: 50%; cursor: pointer;
        }
        .voice-close:hover { background: rgba(255,255,255,0.25); }
        .voice-card h3 { font-size: 18px; margin-bottom: 6px; }
        .voice-card .voice-subtitle { font-size: 13px; color: #a6adc8; margin-bottom: 20px; }

        /* ---- 虚拟头像（纯CSS） ---- */
        .avatar-container {
            width: 140px; height: 140px; margin: 0 auto 20px;
            position: relative;
        }
        .avatar-face {
            width: 130px; height: 130px; border-radius: 50%;
            background: linear-gradient(135deg, #ffd1a4, #f4a460);
            position: absolute; top: 5px; left: 5px;
            transition: transform 0.15s;
        }
        /* 眼睛 */
        .avatar-eye {
            position: absolute; width: 16px; height: 18px;
            background: #333; border-radius: 50%;
            top: 42px; transition: height 0.3s;
        }
        .avatar-eye.left { left: 34px; }
        .avatar-eye.right { right: 34px; }
        .avatar-eye .pupil {
            width: 5px; height: 5px; background: white;
            border-radius: 50%; position: absolute;
            top: 4px; left: 8px;
        }
        /* 眨眼 */
        .blinking .avatar-eye { height: 2px; }
        /* 嘴巴 */
        .avatar-mouth {
            position: absolute; bottom: 32px; left: 50%;
            transform: translateX(-50%);
            width: 36px; height: 8px;
            border-radius: 0 0 36px 36px;
            background: #d4766b;
            transition: all 0.2s;
        }
        /* 说话时嘴巴张大 */
        .avatar-container.talking .avatar-mouth {
            width: 28px; height: 20px;
            border-radius: 50%;
            animation: mouthTalk 0.3s ease-in-out infinite alternate;
        }
        @keyframes mouthTalk {
            from { height: 12px; width: 24px; }
            to { height: 24px; width: 18px; }
        }
        /* 听音时头像呼吸 */
        .avatar-container.listening .avatar-face {
            animation: breatheListen 1.2s ease-in-out infinite;
        }
        @keyframes breatheListen {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(102,126,234,0.4); }
            50% { transform: scale(1.06); box-shadow: 0 0 40px rgba(102,126,234,0.7); }
        }
        /* 空闲时浮动 */
        .avatar-container.idle .avatar-face {
            animation: floatIdle 3s ease-in-out infinite;
        }
        @keyframes floatIdle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        /* 腮红 */
        .avatar-blush {
            position: absolute; width: 18px; height: 10px;
            background: rgba(255,150,150,0.5); border-radius: 50%;
            top: 58px;
        }
        .avatar-blush.left { left: 20px; }
        .avatar-blush.right { right: 20px; }

        /* 状态指示 */
        .voice-status {
            font-size: 14px; color: #a6e3a1; margin: 8px 0;
            min-height: 20px;
        }
        .voice-text {
            background: rgba(255,255,255,0.08); border-radius: 12px;
            padding: 10px 16px; font-size: 13px; color: #cdd6f4;
            min-height: 40px; margin: 10px 0; line-height: 1.5;
        }
        .voice-btn {
            padding: 12px 32px; border-radius: 24px; border: none;
            font-size: 15px; font-weight: bold; cursor: pointer;
            transition: all 0.3s; margin: 6px;
        }
        .voice-btn.start {
            background: #a6e3a1; color: #1a1a2e;
        }
        .voice-btn.start:hover { background: #89d88a; }
        .voice-btn.start:disabled { background: #555; color: #999; cursor: not-allowed; }
        .voice-btn.stop {
            background: #f38ba8; color: white;
        }
        .voice-btn.stop:hover { background: #e06c8a; }
        .voice-hint {
            font-size: 11px; color: #6c7086; margin-top: 12px;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; left: 0; top: 0; bottom: 0;
                z-index: 50;
            }
            .sidebar.closed {
                min-width: 0; width: 0; overflow: hidden;
            }
            .msg-row { max-width: 95%; }
            .chat-area { padding: 14px; gap: 14px; }
            .input-area { padding: 10px 12px; gap: 8px; }
        }
    </style>
</head>
<body>

<div class="app">

    <!-- ==================== 左侧边栏 ==================== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <button class="hamburger" onclick="toggleSidebar()" title="收起侧边栏">☰</button>
            <span class="logo">AI 学习助手</span>
        </div>

        <div class="user-section" onclick="openProfileModal()" title="点击查看个人资料">
            <div class="avatar">👤</div>
            <div class="user-info">
                <div class="uname" id="sidebarUsername"></div>
                <div class="utag">学习者</div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">最近对话</div>
            <div id="historyList">
                <div class="history-item" onclick="quickChat('我想学Python编程')">
                    <div class="h-time">示例</div>
                    <div class="h-text">我想学Python编程</div>
                </div>
                <div class="history-item" onclick="quickChat('什么是机器学习')">
                    <div class="h-time">示例</div>
                    <div class="h-text">什么是机器学习</div>
                </div>
            </div>
        </div>

        <!-- 学习统计 -->
        <div class="stats-section" onclick="showChartModal()" title="点击查看7天学习统计">
            <div class="today-label">今日已学习</div>
            <div class="today-time" id="todayStats">0 <span>分钟</span></div>
            <div style="font-size:10px;color:#6c7086;margin-top:4px;">📊 查看7天统计</div>
        </div>

        <div class="sidebar-bottom">
            <button class="btn-wrongbook" onclick="openWrongBook()">📚 错题集</button>
            <button class="btn-logout" onclick="logout()">退出登录</button>
        </div>
    </aside>

    <!-- ==================== 右侧主区域 ==================== -->
    <main class="main" onclick="closeSidebarIfOpen()">
        <div class="topbar">
            <button class="tb-hamburger" onclick="toggleSidebar()">☰</button>
            <span class="tb-title">AI 学习助手 · 小助</span>
            <span class="tb-subtitle">DeepSeek 驱动</span>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea"></div>

        <!-- 错题集视图 -->
        <div class="wrongbook-view" id="wrongBookView">
            <h2>📚 错题集</h2>

            <!-- 控制栏 -->
            <div class="wb-controls">
                <select id="quizSubject">
                    <option value="编程">编程</option>
                    <option value="数学">数学</option>
                    <option value="物理">物理</option>
                    <option value="英语">英语</option>
                </select>
                <input type="text" id="customSubject" placeholder="或输入自定义科目...">
            </div>

            <!-- 文档输入 -->
            <textarea id="docContent" placeholder="把课程文档、知识点、错题原文粘贴到这里...&#10;&#10;例如：&#10;- 课堂笔记内容&#10;- 某道题的题干&#10;- 教材某章的知识点总结"></textarea>

            <!-- 出题按钮 -->
            <div style="margin-top:12px;">
                <button class="btn-quiz" id="quizBtn" onclick="generateQuiz()">🤖 AI出题（根据文档生成3道题）</button>
            </div>

            <!-- AI生成的题目展示区 -->
            <div id="quizResults" style="margin-top:16px;"></div>

            <!-- 已保存的错题列表 -->
            <div class="saved-list" id="savedList">
                <h3>📋 我的错题列表</h3>
                <div id="savedQuestions"></div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area" id="chatInputArea">
            <input type="text" id="msgInput" placeholder="输入「我想学XXX」生成学习资源，或者随便聊聊..."
                   maxlength="500">
            <button style="width:42px;height:42px;border-radius:50%;background:#f0f0f0;color:#667eea;border:none;font-size:18px;cursor:pointer;flex-shrink:0;" onclick="openVoiceModal()" title="语音通话">🎤</button>
            <button id="sendBtn" onclick="sendMessage()" title="发送">➤</button>
        </div>
    </main>

</div>

<!-- ==================== 语音通话弹窗 ==================== -->
<div class="voice-modal" id="voiceModal" onclick="if(event.target===this)closeVoiceModal()">
    <div class="voice-card">
        <button class="voice-close" onclick="closeVoiceModal()">✕</button>
        <h3>🎙️ AI 语音通话</h3>
        <p class="voice-subtitle">和小助语音聊天吧！</p>

        <!-- 虚拟形象 -->

                <div class="avatar-eye left"><div class="pupil"></div></div>
                <div class="avatar-eye right"><div class="pupil"></div></div>

                <div class="avatar-blush right"></div>

        <div class="voice-status" id="voiceStatus">准备好倾听你的声音 💬</div>

<!-- ==================== 7天统计图表弹窗 ==================== -->
<div class="chart-modal" id="chartModal" onclick="if(event.target===this)closeChartModal()">
    <div class="chart-card">
        <h3>📊 最近7天学习活跃度</h3>
        <div class="chart-bars" id="chartBars"></div>
        <div style="text-align:center;margin-top:8px;font-size:11px;color:#999;">每日聊天次数</div>
        <button class="chart-close" onclick="closeChartModal()">关闭</button>
    </div>
</div>

<!-- ==================== 个人资料弹窗 ==================== -->
<div class="modal-overlay" id="profileModal" onclick="if(event.target===this)closeProfileModal()">
    <div class="modal-card">
        <div class="modal-header">
            <h3>个人资料</h3>
            <button class="modal-close" onclick="closeProfileModal()">✕</button>
        </div>
        <div class="modal-avatar-lg">👤</div>
        <div class="modal-info-row">
            <span class="info-label">用户名</span>
            <span class="info-value" id="modalUname">-</span>
        </div>
        <div class="modal-info-row">
            <span class="info-label">邮箱</span>
            <span class="info-value" id="modalEmail">-</span>
        </div>
        <div class="modal-info-row">
            <span class="info-label">注册时间</span>
            <span class="info-value" id="modalCreatedAt">-</span>
        </div>
        <button class="btn-changepw" onclick="changePassword()">修改密码</button>
    </div>
</div>

<script>
    // ========== 登录检查 ==========
    var currentUser = localStorage.getItem("ai_currentUser");
    if (!currentUser) { window.location.href = "/login.html"; }
    document.getElementById("sidebarUsername").textContent = currentUser;

    // ========== 对话历史（存在内存里，当前会话有效） ==========
    var chatHistory = [];

    // ========== 侧边栏折叠 ==========
    function toggleSidebar() {
        var sidebar = document.getElementById("sidebar");
        if (sidebar.classList.contains("closed")) {
            sidebar.classList.remove("closed");
        } else {
            sidebar.classList.add("closed");
        }
    }

    // 点击主内容区时自动收起侧边栏（手机端体验）
    function closeSidebarIfOpen() {
        var sidebar = document.getElementById("sidebar");
        // 只在手机端（宽度<768px）且侧边栏展开时起作用
        if (window.innerWidth <= 768 && !sidebar.classList.contains("closed")) {
            sidebar.classList.add("closed");
        }
    }

    // ========== 退出 ==========
    function logout() {
        localStorage.removeItem("ai_currentUser");
        window.location.href = "/login.html";
    }

    // ========== 学习统计 ==========
    function recordLearning() {
        var today = new Date().toISOString().slice(0, 10); // "2026-05-23"
        var stats = JSON.parse(localStorage.getItem("ai_learning_stats") || "{}");
        stats[today] = (stats[today] || 0) + 1;
        // 只保留最近30天
        var keys = Object.keys(stats).sort();
        if (keys.length > 30) {
            var cleaned = {};
            for (var i = keys.length - 30; i < keys.length; i++) { cleaned[keys[i]] = stats[keys[i]]; }
            stats = cleaned;
        }
        localStorage.setItem("ai_learning_stats", JSON.stringify(stats));
        updateTodayDisplay();
    }

    // 更新 "今日已学习 X 分钟"
    function updateTodayDisplay() {
        var today = new Date().toISOString().slice(0, 10);
        var stats = JSON.parse(localStorage.getItem("ai_learning_stats") || "{}");
        var count = stats[today] || 0;
        var minutes = count * 10; // 每次对话算10分钟
        document.getElementById("todayStats").innerHTML = minutes + ' <span>分钟</span>';
    }

    // 获取最近7天数据
    function getWeekStats() {
        var stats = JSON.parse(localStorage.getItem("ai_learning_stats") || "{}");
        var result = [];
        for (var i = 6; i >= 0; i--) {
            var d = new Date();
            d.setDate(d.getDate() - i);
            var key = d.toISOString().slice(0, 10);
            var month = d.getMonth() + 1;
            var day = d.getDate();
            result.push({
                label: month + '/' + day,
                count: stats[key] || 0
            });
        }
        return result;
    }

    // 显示7天图表弹窗
    function showChartModal() {
        var weekData = getWeekStats();
        var maxCount = 0;
        for (var i = 0; i < weekData.length; i++) {
            if (weekData[i].count > maxCount) maxCount = weekData[i].count;
        }
        if (maxCount === 0) maxCount = 1; // 避免除零

        var html = '';
        for (var i = 0; i < weekData.length; i++) {
            var h = Math.max(4, (weekData[i].count / maxCount) * 130);
            var cls = weekData[i].count === 0 ? ' zero' : '';
            html += '<div class="chart-bar-wrap">';
            html += '<div class="chart-count">' + weekData[i].count + '</div>';
            html += '<div class="chart-bar' + cls + '" style="height:' + h + 'px;"></div>';
            html += '<div class="chart-label">' + weekData[i].label + '</div>';
            html += '</div>';
        }

        document.getElementById("chartBars").innerHTML = html;
        document.getElementById("chartModal").classList.add("show");
    }

    function closeChartModal() {
        document.getElementById("chartModal").classList.remove("show");
    }

    // ========== 个人资料弹窗 ==========
    function openProfileModal() {
        var currentUser = localStorage.getItem("ai_currentUser");
        var users = JSON.parse(localStorage.getItem("ai_users") || "{}");
        var user = users[currentUser] || {};

        document.getElementById("modalUname").textContent = currentUser;
        document.getElementById("modalEmail").textContent = user.email || "未设置";
        // 格式化注册时间
        var created = user.createdAt || "";
        if (created) {
            var d = new Date(created);
            created = d.getFullYear() + "-" +
                String(d.getMonth() + 1).padStart(2, "0") + "-" +
                String(d.getDate()).padStart(2, "0") + " " +
                String(d.getHours()).padStart(2, "0") + ":" +
                String(d.getMinutes()).padStart(2, "0");
        }
        document.getElementById("modalCreatedAt").textContent = created || "未知";

        document.getElementById("profileModal").classList.add("show");
    }

    function closeProfileModal() {
        document.getElementById("profileModal").classList.remove("show");
    }

    function changePassword() {
        alert("修改密码功能开发中，敬请期待！");
    }

    // ========== 错题集：切换视图 ==========
    var isWrongBookMode = false;

    function openWrongBook() {
        var wbView = document.getElementById("wrongBookView");
        var chatArea = document.getElementById("chatArea");
        var chatInput = document.getElementById("chatInputArea");

        if (!isWrongBookMode) {
            // 切换到错题集
            chatArea.style.display = "none";
            chatInput.style.display = "none";
            wbView.classList.add("show");
            document.querySelector(".topbar .tb-title").textContent = "📚 错题集";
            // 渲染已保存的错题
            renderSavedQuestions();
        } else {
            // 切换回聊天
            chatArea.style.display = "";
            chatInput.style.display = "";
            wbView.classList.remove("show");
            document.querySelector(".topbar .tb-title").textContent = "AI 学习助手 · 小助";
        }
        isWrongBookMode = !isWrongBookMode;
    }

    // ========== AI出题 ==========
    async function generateQuiz() {
        var subject = document.getElementById("quizSubject").value;
        var customSubject = document.getElementById("customSubject").value.trim();
        var docContent = document.getElementById("docContent").value.trim();
        var quizBtn = document.getElementById("quizBtn");

        if (customSubject) { subject = customSubject; }
        if (!docContent) {
            alert("请先粘贴文档内容！");
            return;
        }

        quizBtn.disabled = true;
        quizBtn.textContent = "⏳ AI正在出题中...";

        try {
            var resp = await fetch("/api/generate_quiz", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ subject: subject, content: docContent })
            });
            var data = await resp.json();

            if (data.error) {
                document.getElementById("quizResults").innerHTML =
                    '<p style="color:#d32f2f;">出题失败：' + data.error + '</p>';
            } else {
                renderQuizResults(data.questions, subject);
            }
        } catch (e) {
            document.getElementById("quizResults").innerHTML =
                '<p style="color:#d32f2f;">网络错误：' + e.message + '</p>';
        } finally {
            quizBtn.disabled = false;
            quizBtn.textContent = "🤖 AI出题（根据文档生成3道题）";
        }
    }

    // ========== 显示AI生成的题目 ==========
    function renderQuizResults(questions, subject) {
        var html = '<h3>📝 AI生成的题目（' + escapeHtml(subject) + '）</h3>';
        for (var i = 0; i < questions.length; i++) {
            var q = questions[i];
            html += '<div class="quiz-card">';
            html += '<div class="q-title">第' + (i + 1) + '题：' + escapeHtml(q.question) + '</div>';
            html += '<div class="q-answer">📖 参考答案：' + escapeHtml(q.answer) + '</div>';
            html += '<button class="btn-sm btn-save" onclick=\'saveQuestion(' +
                JSON.stringify(q.question).replace(/'/g, "&#39;") + ', ' +
                JSON.stringify(q.answer).replace(/'/g, "&#39;") + ', ' +
                JSON.stringify(subject).replace(/'/g, "&#39;") + ')\'>保存到错题集</button>';
            html += '</div>';
        }
        document.getElementById("quizResults").innerHTML = html;
    }

    // ========== 保存错题到localStorage ==========
    function saveQuestion(question, answer, subject) {
        var wrongBook = JSON.parse(localStorage.getItem("ai_wrongbook") || "[]");
        wrongBook.unshift({
            id: Date.now(),
            question: question,
            answer: answer,
            subject: subject,
            time: new Date().toISOString()
        });
        localStorage.setItem("ai_wrongbook", JSON.stringify(wrongBook));
        renderSavedQuestions();
        alert("已保存到错题集！");
    }

    // ========== 删除错题 ==========
    function deleteQuestion(id) {
        if (!confirm("确定删除这道错题吗？")) return;
        var wrongBook = JSON.parse(localStorage.getItem("ai_wrongbook") || "[]");
        wrongBook = wrongBook.filter(function(item) { return item.id !== id; });
        localStorage.setItem("ai_wrongbook", JSON.stringify(wrongBook));
        renderSavedQuestions();
    }

    // ========== 渲染已保存的错题列表 ==========
    function renderSavedQuestions() {
        var wrongBook = JSON.parse(localStorage.getItem("ai_wrongbook") || "[]");
        var container = document.getElementById("savedQuestions");

        if (wrongBook.length === 0) {
            container.innerHTML = '<p style="color:#999;">还没有保存错题哦~ 用AI出题后保存到这里。</p>';
            return;
        }

        // 按科目分组
        var groups = {};
        for (var i = 0; i < wrongBook.length; i++) {
            var subj = wrongBook[i].subject || "其他";
            if (!groups[subj]) { groups[subj] = []; }
            groups[subj].push(wrongBook[i]);
        }

        var html = '';
        for (var subject in groups) {
            html += '<h4 style="color:#667eea;margin:16px 0 8px;">📌 ' + escapeHtml(subject) + '（' + groups[subject].length + '题）</h4>';
            for (var j = 0; j < groups[subject].length; j++) {
                var item = groups[subject][j];
                var t = new Date(item.time);
                var timeStr = t.getMonth() + 1 + '/' + t.getDate() + ' ' +
                    String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0');
                html += '<div class="quiz-card">';
                html += '<div class="q-title">' + escapeHtml(item.question) + '</div>';
                html += '<div class="q-answer">📖 ' + escapeHtml(item.answer) + '</div>';
                html += '<span style="font-size:11px;color:#999;">' + timeStr + '</span>';
                html += ' <button class="btn-sm btn-delete" onclick="deleteQuestion(' + item.id + ')" style="float:right;">删除</button>';
                html += '</div>';
            }
        }
        container.innerHTML = html;
    }

    // ========== 快速对话 ==========
    function quickChat(text) {
        document.getElementById("msgInput").value = text;
        sendMessage();
    }

    // ========== 页面加载：AI主动打招呼 ==========
    window.onload = function() {
        updateTodayDisplay();
        addAIBubble(
            "嗨！我是你的学习伙伴 <strong>小助</strong> 😊<br><br>" +
            "你可以直接说 <strong>「我想学Python」</strong> 或 <strong>「我想学机器学习」</strong>，" +
            "我会立刻为你生成：<br>" +
            "📋 学习画像 &nbsp; 🗺 四周路线图 &nbsp; 📖 完整教程 &nbsp; ✏️ 练习题 &nbsp; 🧠 思维导图<br><br>" +
            "也可以随便跟我聊聊学习上的问题，当我是你的学长/学姐就好！"
        );
    };

    // ========== 发送消息 ==========
    async function sendMessage() {
        var input = document.getElementById("msgInput");
        var msg = input.value.trim();
        var sendBtn = document.getElementById("sendBtn");
        if (!msg) return;

        addUserBubble(msg);
        input.value = "";
        sendBtn.disabled = true;
        chatHistory.push({ role: "user", content: msg });

        // 记录学习统计
        recordLearning();

        // ---- 检测是否是"我想学XXX"模式 ----
        var learnMatch = msg.match(/我想学(?:习)?[：:]?\s*(.+)/);
        var genMatch = msg.match(/生成学习资源[：:]\s*(.+)/);

        if (learnMatch || genMatch) {
            // 提取主题
            var topic = (learnMatch ? learnMatch[1] : genMatch[1]).trim();

            // 显示确认消息
            var confirmMsg = "好的！让我来分析你的学习需求，为你生成 <strong>" + escapeHtml(topic) + "</strong> 的专属学习资源 🚀<br><br>正在调用三位AI助教：画像师分析基础 → 规划师制定路线 → 资源师编写内容...";
            addAIBubble(confirmMsg);
            chatHistory.push({ role: "assistant", content: confirmMsg });

            // 直接调用生成（默认零基础，对话中AI不会每次都问到水平）
            await generateResources(topic, "零基础");
        } else {
            // ---- 正常聊天流程 ----
            var typingEl = addTypingIndicator();
            scrollToBottom();

            try {
                var resp = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg, history: chatHistory.slice(0, -1) })
                });
                var data = await resp.json();

                // 检查聊天回复中是否也包含生成标记（AI主动识别到的）
                var reply = data.reply || "（小助走神了，再说一次吧~）";
                var chatGenMatch = reply.match(/\[GENERATE:(.+?):(.+?)\]/);

                if (chatGenMatch) {
                    typingEl.remove();
                    var cleanReply = reply.replace(/\[GENERATE:.*?\]/, "").trim();
                    if (cleanReply) {
                        addAIBubble(cleanReply);
                        chatHistory.push({ role: "assistant", content: cleanReply });
                    }
                    await generateResources(chatGenMatch[1].trim(), chatGenMatch[2].trim());
                } else {
                    typingEl.remove();
                    addAIBubble(reply);
                    chatHistory.push({ role: "assistant", content: reply });
                    addHistoryItem(msg);
                }
            } catch (e) {
                typingEl.remove();
                addAIBubble("哎呀网络不太好，再说一次吧 😅");
            }
        }

        sendBtn.disabled = false;
        scrollToBottom();
    }

    // ========== 生成学习资源 ==========
    async function generateResources(topic, level) {
        var typingEl = addTypingIndicator("正在为你生成学习资源，这可能需要几十秒...");
        scrollToBottom();

        try {
            var resp = await fetch("/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ topic: topic, level: level })
            });
            var data = await resp.json();
            typingEl.remove();

            if (data.error) {
                addAIBubble("资源生成出了点问题：" + data.error + " 不过我们可以继续聊其他话题~");
            } else {
                // 添加带标签切换的AI回复
                addAIResourceCard(data);
                chatHistory.push({ role: "assistant", content: "[生成的学习资源]" });
                addHistoryItem(topic);
            }
        } catch (e) {
            typingEl.remove();
            addAIBubble("资源生成失败了，可能是网络问题，再试一次吧 😅");
        }
    }

    // ========== 添加用户消息气泡 ==========
    function addUserBubble(text) {
        var el = document.createElement("div");
        el.className = "msg-row user";
        el.innerHTML = '<div class="msg-avatar">👤</div><div class="msg-bubble">' + escapeHtml(text) + '</div>';
        document.getElementById("chatArea").appendChild(el);
    }

    // ========== 添加AI消息气泡 ==========
    function addAIBubble(html) {
        var el = document.createElement("div");
        el.className = "msg-row ai";
        el.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble">' + html + '</div>';
        document.getElementById("chatArea").appendChild(el);
    }

    // ========== 添加"正在输入" ==========
    function addTypingIndicator(text) {
        text = text || "小助正在输入...";
        var el = document.createElement("div");
        el.className = "msg-row ai";
        el.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble">' +
            text + ' <span class="typing-dots"><span></span><span></span><span></span></span></div>';
        document.getElementById("chatArea").appendChild(el);
        return el;
    }

    // ========== 添加资源卡片（可折叠，带5个标签） ==========
    function addAIResourceCard(data) {
        var msgId = "r_" + Date.now();
        var contentMD = data.content || "";

        var parts = splitBySections(contentMD);
        var tutorialParts = [], exercisePart = "", mindmapPart = "";
        for (var i = 0; i < parts.length; i++) {
            var t = parts[i].title.toLowerCase();
            if (t.indexOf("练习") >= 0) { exercisePart = parts[i].body; }
            else if (t.indexOf("思维导图") >= 0 || t.indexOf("知识脉络") >= 0) { mindmapPart = parts[i].body; }
            else { tutorialParts.push(parts[i].title + "\n" + parts[i].body); }
        }

        // 头部：带折叠按钮
        var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
        html += '<span style="font-weight:bold;color:#667eea;">✅ 学习资源已生成：「' + escapeHtml(data.topic) + '」</span>';
        html += '<button onclick="toggleCard(\'' + msgId + '_body\',this)" style="background:none;border:1px solid #ddd;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;color:#999;">收起 ▲</button>';
        html += '</div>';

        // 内容体（可折叠）
        html += '<div id="' + msgId + '_body">';
        html += '<div class="tabs-inline">';
        html += '<button class="active" onclick="switchResTab(\'' + msgId + '\',\'profile\',this)">📋 学习画像</button>';
        html += '<button onclick="switchResTab(\'' + msgId + '\',\'roadmap\',this)">🗺 路线图</button>';
        html += '<button onclick="switchResTab(\'' + msgId + '\',\'tutorial\',this)">📖 教程</button>';
        html += '<button onclick="switchResTab(\'' + msgId + '\',\'exercise\',this)">✏️ 练习题</button>';
        html += '<button onclick="switchResTab(\'' + msgId + '\',\'mindmap\',this)">🧠 思维导图</button>';
        html += '</div>';

        html += '<div class="tab-section active" id="' + msgId + '_profile">' + md2html(data.profile || "") + '</div>';
        html += '<div class="tab-section" id="' + msgId + '_roadmap">' + md2html(data.roadmap || "") + '</div>';
        html += '<div class="tab-section" id="' + msgId + '_tutorial">' +
            (tutorialParts.length > 0 ? md2html(tutorialParts.join("\n\n")) : md2html(contentMD)) + '</div>';
        html += '<div class="tab-section" id="' + msgId + '_exercise">' +
            (exercisePart ? md2html(exercisePart) : "<p>练习题见教程部分</p>") + '</div>';
        html += '<div class="tab-section" id="' + msgId + '_mindmap">' +
            (mindmapPart ? md2html(mindmapPart) : "<p>思维导图见教程部分</p>") + '</div>';
        html += '</div>'; // end card body

        var wrapper = document.createElement("div");
        wrapper.className = "msg-row ai";
        wrapper.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble" style="max-width:100%;">' + html + '</div>';
        document.getElementById("chatArea").appendChild(wrapper);
    }

    // ========== 折叠/展开卡片 ==========
    function toggleCard(bodyId, btn) {
        var body = document.getElementById(bodyId);
        if (body.style.display === "none") {
            body.style.display = "";
            btn.textContent = "收起 ▲";
        } else {
            body.style.display = "none";
            btn.textContent = "展开 ▼";
        }
    }

    // ========== 资源标签切换 ==========
    function switchResTab(msgId, tabName, btn) {
        var bubble = btn.parentElement.parentElement;
        bubble.querySelectorAll(".tabs-inline button").forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");
        bubble.querySelectorAll(".tab-section").forEach(function(s) { s.classList.remove("active"); });
        var target = bubble.querySelector("#" + msgId + "_" + tabName);
        if (target) target.classList.add("active");
    }

    // ========== Markdown → HTML ==========
    function md2html(md) {
        if (!md) return "<p>暂无内容</p>";
        var h = md.replace(/\r\n/g, "\n");

        var cbs = [];
        h = h.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
            var i = cbs.length;
            cbs.push("<pre><code>" + code.replace(/</g,"&lt;").replace(/>/g,"&gt;") + "</code></pre>");
            return "%%CB" + i + "%%";
        });

        h = h.replace(/`([^`]+)`/g, "<code>$1</code>");
        h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

        h = h.replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/g, function(m, header, rows) {
            var t = "<table><thead><tr>";
            header.split("|").filter(function(c){return c.trim();}).forEach(function(c){t+="<th>"+c.trim()+"</th>";});
            t += "</tr></thead><tbody>";
            rows.split("\n").filter(function(r){return r.trim();}).forEach(function(r){
                t += "<tr>";
                r.split("|").filter(function(c){return c.trim();}).forEach(function(c){t+="<td>"+c.trim()+"</td>";});
                t += "</tr>";
            });
            return t + "</tbody></table>";
        });

        h = h.replace(/^#### (.+)$/gm, "<h4>$1</h4>");
        h = h.replace(/^### (.+)$/gm, "<h3>$1</h3>");
        h = h.replace(/^## (.+)$/gm, "<h2>$1</h2>");
        h = h.replace(/^- (.+)$/gm, "<li>$1</li>");
        h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, "<ul>$1</ul>");
        h = h.replace(/^---$/gm, "<hr>");
        h = h.replace(/\n\n/g, "</p><p>");
        h = h.replace(/\n/g, "<br>");
        h = "<p>" + h + "</p>";

        for (var i = 0; i < cbs.length; i++) { h = h.replace("%%CB" + i + "%%", cbs[i]); }
        return h;
    }

    function splitBySections(md) {
        var s = [], lines = md.split("\n"), t = "", b = [];
        for (var i = 0; i < lines.length; i++) {
            if (/^## [^#]/.test(lines[i])) {
                if (t || b.length > 0) s.push({title:t, body:b.join("\n").trim()});
                t = lines[i].replace(/^## /, ""); b = [];
            } else { b.push(lines[i]); }
        }
        if (t || b.length > 0) s.push({title:t, body:b.join("\n").trim()});
        return s;
    }

    function escapeHtml(text) {
        var d = document.createElement("div");
        d.textContent = text;
        return d.innerHTML.replace(/\n/g, "<br>");
    }

    // ========== 添加历史记录 ==========
    function addHistoryItem(topic) {
        var list = document.getElementById("historyList");
        var time = new Date();
        var timeStr = time.getHours() + ":" + String(time.getMinutes()).padStart(2, "0");
        var item = document.createElement("div");
        item.className = "history-item";
        item.onclick = function() { quickChat(topic); };
        item.innerHTML = '<div class="h-time">' + timeStr + '</div><div class="h-text">' + escapeHtml(topic) + '</div>';
        list.insertBefore(item, list.firstChild);
    }

    function scrollToBottom() {
        var ca = document.getElementById("chatArea");
        setTimeout(function() { ca.scrollTop = ca.scrollHeight; }, 100);
    }

    // ========== 回车发送 ==========
    document.getElementById("msgInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // ========== 语音通话功能 ==========
    var recognition = null;
    var isListening = false;

    // 判断浏览器是否支持语音识别
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function openVoiceModal() {
        document.getElementById("voiceModal").classList.add("show");
        setAvatarState("idle");
    }

    function closeVoiceModal() {
        stopListening();
        window.speechSynthesis.cancel(); // 停止朗读
        document.getElementById("voiceModal").classList.remove("show");
    }

    // 切换虚拟形象状态
    function setAvatarState(state) {
        var avatar = document.getElementById("avatarContainer");
        avatar.className = "avatar-container " + state;
    }

    // 眨眼动画（每3秒眨一次）
    setInterval(function() {
        var avatar = document.getElementById("avatarContainer");
        avatar.classList.add("blinking");
        setTimeout(function() { avatar.classList.remove("blinking"); }, 200);
    }, 3000);

    // ========== 开始语音识别 ==========
    function startListening() {
        if (!SpeechRecognition) {
            alert("您的浏览器不支持语音识别，请使用 Chrome 或 Edge 浏览器。");
            return;
        }

        if (isListening) return;

        recognition = new SpeechRecognition();
        recognition.lang = "zh-CN";        // 中文识别
        recognition.interimResults = false; // 只返回最终结果
        recognition.continuous = false;     // 说一句就停
        recognition.maxAlternatives = 1;

        recognition.onstart = function() {
            isListening = true;
            document.getElementById("voiceStartBtn").style.display = "none";
            document.getElementById("voiceStopBtn").style.display = "inline-block";
            document.getElementById("voiceStatus").textContent = "🎧 正在倾听中...";
            document.getElementById("voiceText").textContent = "请对着麦克风说话...";
            setAvatarState("listening");
        };

        recognition.onresult = function(event) {
            var text = event.results[0][0].transcript;
            document.getElementById("voiceText").textContent = "你说：" + text;
            // 识别到文字后，发给AI
            processVoiceMessage(text);
        };

        recognition.onerror = function(event) {
            var errMsg = "语音识别出错：" + event.error;
            if (event.error === "not-allowed") {
                errMsg = "请允许麦克风权限后重试";
            } else if (event.error === "no-speech") {
                errMsg = "没有检测到语音，请再试一次";
            }
            document.getElementById("voiceText").textContent = errMsg;
            resetVoiceButtons();
            setAvatarState("idle");
            isListening = false;
        };

        recognition.onend = function() {
            isListening = false;
            resetVoiceButtons();
        };

        recognition.start();
    }

    // ========== 停止语音识别 ==========
    function stopListening() {
        if (recognition && isListening) {
            recognition.stop();
            isListening = false;
        }
        resetVoiceButtons();
        setAvatarState("idle");
    }

    function resetVoiceButtons() {
        document.getElementById("voiceStartBtn").style.display = "inline-block";
        document.getElementById("voiceStopBtn").style.display = "none";
    }

    // ========== 处理语音消息：发给AI + 朗读回复 ==========
    async function processVoiceMessage(userText) {
        setAvatarState("idle");
        document.getElementById("voiceStatus").textContent = "🤔 小助正在思考...";

        try {
            // 发给聊天接口
            var resp = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userText, history: chatHistory.slice(-5) })
            });
            var data = await resp.json();
            var reply = data.reply || "小助没听清，再说一次吧~";

            // 显示回复文字
            document.getElementById("voiceText").textContent = "小助：" + reply;
            document.getElementById("voiceStatus").textContent = "🔊 小助正在说话...";

            // 添加到聊天记录（同步到主聊天界面）
            addUserBubble(userText);
            chatHistory.push({ role: "user", content: userText });
            addAIBubble(reply);
            chatHistory.push({ role: "assistant", content: reply });
            recordLearning();

            // 检测是否有生成标记
            var genMatch = reply.match(/\[GENERATE:(.+?):(.+?)\]/);
            if (genMatch) {
                var cleanReply = reply.replace(/\[GENERATE:.*?\]/, "").trim();
                if (cleanReply) {
                    // 朗读清理后的回复
                    speakText(cleanReply);
                }
                // 触发生成
                await generateResources(genMatch[1].trim(), genMatch[2].trim());
                return;
            }

            // 朗读AI回复
            speakText(reply);

        } catch (e) {
            document.getElementById("voiceText").textContent = "网络错误：" + e.message;
            document.getElementById("voiceStatus").textContent = "😅 出了点问题";
        }
    }

    // ========== 文字转语音（浏览器自带TTS） ==========
    function speakText(text) {
        // 去掉Markdown标记，保留纯文本
        var cleanText = text
            .replace(/\*\*(.+?)\*\*/g, "$1")
            .replace(/```[\s\S]*?```/g, "")
            .replace(/`([^`]+)`/g, "$1")
            .replace(/\[GENERATE:.*?\]/g, "")
            .replace(/[#*>\-|]/g, "")
            .replace(/\n{2,}/g, "。")
            .replace(/\n/g, "")
            .trim();

        // 如果文本太长，截断
        if (cleanText.length > 500) {
            cleanText = cleanText.substring(0, 500) + "...";
        }

        var utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = "zh-CN";
        utterance.rate = 1.1;  // 语速稍快
        utterance.pitch = 1.1; // 音调稍高（更亲切）

        // 尝试选择中文女声
        var voices = window.speechSynthesis.getVoices();
        var zhVoice = voices.find(function(v) { return v.lang.indexOf("zh") >= 0 && v.name.indexOf("Tingting") >= 0; });
        if (!zhVoice) {
            zhVoice = voices.find(function(v) { return v.lang.indexOf("zh") >= 0; });
        }
        if (zhVoice) { utterance.voice = zhVoice; }

        // 朗读时嘴巴张合
        setAvatarState("talking");

        utterance.onend = function() {
            setAvatarState("idle");
            document.getElementById("voiceStatus").textContent = "准备好倾听你的声音 💬";
        };

        utterance.onerror = function() {
            setAvatarState("idle");
            document.getElementById("voiceStatus").textContent = "准备好倾听你的声音 💬";
        };

        window.speechSynthesis.cancel(); // 取消之前可能还在读的内容
        window.speechSynthesis.speak(utterance);
    }

    // 预加载语音列表
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = function() {
        window.speechSynthesis.getVoices();
    };

</script>
