<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI学习助手 - 对话式学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }

        /* ========== 整体布局 ========== */
        .app { display: flex; height: 100vh; overflow: hidden; }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 260px; min-width: 260px;
            background: #1e1e2e; color: #cdd6f4;
            display: flex; flex-direction: column;
            transition: all 0.3s;
            position: relative; z-index: 20;
        }
        /* 收起状态 */
        .sidebar.closed {
            min-width: 0; width: 0;
            overflow: hidden;
        }

        .sidebar-top {
            display: flex; align-items: center;
            padding: 12px 16px; gap: 12px;
            border-bottom: 1px solid #313244;
        }
        .sidebar .hamburger {
            background: none; border: none;
            color: #cdd6f4; font-size: 22px;
            cursor: pointer; padding: 4px 8px; border-radius: 6px;
            flex-shrink: 0;
        }
        .sidebar .hamburger:hover { background: #313244; }
        .sidebar .logo { font-size: 16px; font-weight: bold; color: #cba6f7; white-space: nowrap; }

        .user-section {
            display: flex; align-items: center; gap: 12px;
            padding: 18px 16px; border-bottom: 1px solid #313244;
        }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: white; flex-shrink: 0;
        }
        .user-info .uname { font-size: 15px; font-weight: bold; color: #fff; }
        .user-info .utag { font-size: 12px; color: #a6adc8; }

        .history-section { flex: 1; overflow-y: auto; padding: 12px; }
        .history-title { font-size: 12px; color: #a6adc8; padding: 8px 4px 6px; }
        .history-item {
            padding: 10px 12px; border-radius: 8px;
            cursor: pointer; margin-bottom: 4px;
        }
        .history-item:hover { background: #313244; }
        .history-item .h-time { font-size: 11px; color: #6c7086; margin-bottom: 2px; }
        .history-item .h-text {
            font-size: 13px; color: #cdd6f4;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .sidebar-bottom { border-top: 1px solid #313244; padding: 12px 16px; }
        .btn-wrongbook {
            width: 100%; padding: 10px;
            background: #313244; color: #f38ba8;
            border: 1px solid #45475a; border-radius: 8px;
            cursor: pointer; font-size: 14px;
        }
        .btn-wrongbook:hover { background: #45475a; }
        .btn-logout {
            width: 100%; padding: 8px; background: none;
            color: #6c7086; border: none; cursor: pointer;
            font-size: 12px; margin-top: 6px;
        }
        .btn-logout:hover { color: #f38ba8; }

        /* ========== 右侧主区域 ========== */
        .main {
            flex: 1; display: flex; flex-direction: column;
            background: #f0f4f8; min-width: 0;
        }

        .topbar {
            background: white; padding: 12px 20px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-shrink: 0;
        }
        .topbar .tb-hamburger {
            display: block; background: none; border: none;
            font-size: 22px; cursor: pointer; padding: 4px 8px;
            color: #333; border-radius: 6px;
        }
        .topbar .tb-hamburger:hover { background: #f0f0f0; }
        .topbar .tb-title { font-size: 16px; font-weight: bold; color: #333; }
        .topbar .tb-subtitle { font-size: 12px; color: #999; margin-left: auto; }

        /* ========== 聊天区域 ========== */
        .chat-area {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 18px;
        }

        /* 消息气泡 */
        .msg-row { display: flex; gap: 10px; max-width: 80%; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.ai { align-self: flex-start; }
        .msg-avatar {
            width: 35px; height: 35px; border-radius: 50%;
            flex-shrink: 0; display: flex;
            align-items: center; justify-content: center; font-size: 16px;
        }
        .msg-row.user .msg-avatar { background: #667eea; color: white; }
        .msg-row.ai .msg-avatar { background: #cba6f7; color: white; }
        .msg-bubble {
            padding: 12px 16px; border-radius: 18px;
            font-size: 14px; line-height: 1.7; word-break: break-word;
        }
        .msg-row.user .msg-bubble {
            background: #667eea; color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-row.ai .msg-bubble {
            background: white; color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        /* AI消息内Markdown样式 */
        .msg-row.ai .msg-bubble h2 { color: #667eea; margin: 14px 0 8px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .msg-row.ai .msg-bubble h3 { color: #444; margin: 10px 0 6px; font-size: 15px; }
        .msg-row.ai .msg-bubble table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        .msg-row.ai .msg-bubble table th, .msg-row.ai .msg-bubble table td { border: 1px solid #ddd; padding: 7px; text-align: left; }
        .msg-row.ai .msg-bubble table th { background: #667eea; color: white; }
        .msg-row.ai .msg-bubble table tr:nth-child(even) { background: #f9f9f9; }
        .msg-row.ai .msg-bubble ul, .msg-row.ai .msg-bubble ol { padding-left: 20px; }
        .msg-row.ai .msg-bubble li { margin: 3px 0; }
        .msg-row.ai .msg-bubble pre { background: #282c34; color: #abb2bf; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; font-size: 13px; }
        .msg-row.ai .msg-bubble code { background: #f0f0f0; padding: 2px 5px; border-radius: 4px; font-size: 13px; }
        .msg-row.ai .msg-bubble pre code { background: none; padding: 0; }
        .msg-row.ai .msg-bubble hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
        .msg-row.ai .msg-bubble strong { color: #333; }

        /* 标签切换 */
        .tabs-inline { display: flex; gap: 6px; margin: 10px 0; flex-wrap: wrap; }
        .tabs-inline button {
            padding: 6px 14px; border: 1.5px solid #667eea;
            background: white; color: #667eea;
            border-radius: 16px; cursor: pointer;
            font-size: 12px; font-weight: bold;
            transition: all 0.2s;
        }
        .tabs-inline button:hover { background: #f0f0ff; }
        .tabs-inline button.active { background: #667eea; color: white; }
        .tab-section { display: none; margin-top: 8px; }
        .tab-section.active { display: block; }

        /* 打字动画 */
        .typing-dots { display: flex; gap: 4px; padding: 8px 0; }
        .typing-dots span {
            width: 7px; height: 7px; background: #999;
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-7px); }
        }

        /* 输入区 */
        .input-area {
            background: white; padding: 14px 20px;
            display: flex; gap: 10px; align-items: center;
            box-shadow: 0 -1px 4px rgba(0,0,0,0.06); flex-shrink: 0;
        }
        .input-area input {
            flex: 1; padding: 10px 16px;
            border: 2px solid #e0e0e0; border-radius: 24px;
            font-size: 14px;
        }
        .input-area input:focus { outline: none; border-color: #667eea; }
        .input-area button {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; font-size: 18px;
            cursor: pointer; flex-shrink: 0;
        }
        .input-area button:hover { transform: scale(1.08); }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; left: 0; top: 0; bottom: 0;
                z-index: 50;
            }
            .sidebar.closed {
                min-width: 0; width: 0; overflow: hidden;
            }
            .msg-row { max-width: 95%; }
            .chat-area { padding: 14px; gap: 14px; }
            .input-area { padding: 10px 12px; gap: 8px; }
        }
    </style>
</head>
<body>

<div class="app">

    <!-- ==================== 左侧边栏 ==================== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <button class="hamburger" onclick="toggleSidebar()" title="收起侧边栏">☰</button>
            <span class="logo">AI 学习助手</span>
        </div>

        <div class="user-section">
            <div class="avatar">👤</div>
            <div class="user-info">
                <div class="uname" id="sidebarUsername"></div>
                <div class="utag">学习者</div>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">最近对话</div>
            <div id="historyList">
                <div class="history-item" onclick="quickChat('我想学Python编程')">
                    <div class="h-time">示例</div>
                    <div class="h-text">我想学Python编程</div>
                </div>
                <div class="history-item" onclick="quickChat('什么是机器学习')">
                    <div class="h-time">示例</div>
                    <div class="h-text">什么是机器学习</div>
                </div>
            </div>
        </div>

        <div class="sidebar-bottom">
            <button class="btn-wrongbook" onclick="openWrongBook()">📚 错题集</button>
            <button class="btn-logout" onclick="logout()">退出登录</button>
        </div>
    </aside>

    <!-- ==================== 右侧主区域 ==================== -->
    <main class="main">
        <div class="topbar">
            <button class="tb-hamburger" onclick="toggleSidebar()">☰</button>
            <span class="tb-title">AI 学习助手 · 小助</span>
            <span class="tb-subtitle">DeepSeek 驱动</span>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea"></div>

        <!-- 输入区域 -->
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="输入你想说的话..."
                   maxlength="500">
            <button id="sendBtn" onclick="sendMessage()" title="发送">➤</button>
        </div>
    </main>

</div>

<script>
    // ========== 登录检查 ==========
    var currentUser = localStorage.getItem("ai_currentUser");
    if (!currentUser) { window.location.href = "/login.html"; }
    document.getElementById("sidebarUsername").textContent = currentUser;

    // ========== 对话历史（存在内存里，当前会话有效） ==========
    var chatHistory = [];

    // ========== 侧边栏折叠 ==========
    function toggleSidebar() {
        var sidebar = document.getElementById("sidebar");
        if (sidebar.classList.contains("closed")) {
            sidebar.classList.remove("closed");
        } else {
            sidebar.classList.add("closed");
        }
    }

    // ========== 退出 ==========
    function logout() {
        localStorage.removeItem("ai_currentUser");
        window.location.href = "/login.html";
    }

    // ========== 错题集 ==========
    function openWrongBook() {
        alert("错题集功能即将上线！这里会收集你做错的练习题。");
    }

    // ========== 快速对话 ==========
    function quickChat(text) {
        document.getElementById("msgInput").value = text;
        sendMessage();
    }

    // ========== 页面加载：AI主动打招呼 ==========
    window.onload = function() {
        addAIBubble(
            "嗨！我是你的学习伙伴 <strong>小助</strong> 😊<br><br>" +
            "我对各种知识都很了解呢——编程、数学、语言、设计、摄影……你想学点什么？" +
            "或者有什么想了解的？<br><br>" +
            "跟我说说你的想法吧，不用太正式，就当和朋友聊天一样！"
        );
    };

    // ========== 发送消息 ==========
    async function sendMessage() {
        var input = document.getElementById("msgInput");
        var msg = input.value.trim();
        var sendBtn = document.getElementById("sendBtn");
        if (!msg) return;

        // 添加用户消息
        addUserBubble(msg);
        input.value = "";
        sendBtn.disabled = true;

        // 添加到历史
        chatHistory.push({ role: "user", content: msg });

        // 显示"正在输入"
        var typingEl = addTypingIndicator();
        scrollToBottom();

        // 调用 /chat 对话接口
        try {
            var resp = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg, history: chatHistory.slice(0, -1) })
            });
            var data = await resp.json();
            typingEl.remove();

            var reply = data.reply || "（小助走神了，再说一次吧~）";

            // 检查是否包含生成标记 [GENERATE:主题:水平]
            var genMatch = reply.match(/\[GENERATE:(.+?):(.+?)\]/);
            if (genMatch) {
                // 移除标记，显示对话内容
                var cleanReply = reply.replace(/\[GENERATE:.*?\]/, "").trim();
                if (cleanReply) {
                    addAIBubble(cleanReply);
                }
                chatHistory.push({ role: "assistant", content: cleanReply || "好的，我来为你生成学习资源！" });

                // 自动触发资源生成
                var topic = genMatch[1].trim();
                var level = genMatch[2].trim();
                await generateResources(topic, level);
            } else {
                addAIBubble(reply);
                chatHistory.push({ role: "assistant", content: reply });
                // 保存到历史列表
                addHistoryItem(msg);
            }

        } catch (e) {
            typingEl.remove();
            addAIBubble("哎呀网络不太好，再说一次吧 😅");
        } finally {
            sendBtn.disabled = false;
        }

        scrollToBottom();
    }

    // ========== 生成学习资源 ==========
    async function generateResources(topic, level) {
        var typingEl = addTypingIndicator("正在为你生成学习资源，这可能需要几十秒...");
        scrollToBottom();

        try {
            var resp = await fetch("/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ topic: topic, level: level })
            });
            var data = await resp.json();
            typingEl.remove();

            if (data.error) {
                addAIBubble("资源生成出了点问题：" + data.error + " 不过我们可以继续聊其他话题~");
            } else {
                // 添加带标签切换的AI回复
                addAIResourceCard(data);
                chatHistory.push({ role: "assistant", content: "[生成的学习资源]" });
                addHistoryItem(topic);
            }
        } catch (e) {
            typingEl.remove();
            addAIBubble("资源生成失败了，可能是网络问题，再试一次吧 😅");
        }
    }

    // ========== 添加用户消息气泡 ==========
    function addUserBubble(text) {
        var el = document.createElement("div");
        el.className = "msg-row user";
        el.innerHTML = '<div class="msg-avatar">👤</div><div class="msg-bubble">' + escapeHtml(text) + '</div>';
        document.getElementById("chatArea").appendChild(el);
    }

    // ========== 添加AI消息气泡 ==========
    function addAIBubble(html) {
        var el = document.createElement("div");
        el.className = "msg-row ai";
        el.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble">' + html + '</div>';
        document.getElementById("chatArea").appendChild(el);
    }

    // ========== 添加"正在输入" ==========
    function addTypingIndicator(text) {
        text = text || "小助正在输入...";
        var el = document.createElement("div");
        el.className = "msg-row ai";
        el.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble">' +
            text + ' <span class="typing-dots"><span></span><span></span><span></span></span></div>';
        document.getElementById("chatArea").appendChild(el);
        return el;
    }

    // ========== 添加资源卡片（带5个标签） ==========
    function addAIResourceCard(data) {
        var msgId = "r_" + Date.now();
        var contentMD = data.content || "";

        var parts = splitBySections(contentMD);
        var tutorialParts = [], exercisePart = "", mindmapPart = "";
        for (var i = 0; i < parts.length; i++) {
            var t = parts[i].title.toLowerCase();
            if (t.indexOf("练习") >= 0) { exercisePart = parts[i].body; }
            else if (t.indexOf("思维导图") >= 0 || t.indexOf("知识脉络") >= 0) { mindmapPart = parts[i].body; }
            else { tutorialParts.push(parts[i].title + "\n" + parts[i].body); }
        }

        var html = '<div style="font-weight:bold;color:#667eea;margin-bottom:8px;">为你生成 「' +
            escapeHtml(data.topic) + '」 的学习资源：</div>';

        html += '<div class="tabs-inline">';
        html += '<button class="active" onclick="switchResTab(\'' + msgId + '\',\'profile\',this)">📋 学习画像</button>';
        html += '<button onclick="switchResTab(\'' + msgId + '\',\'roadmap\',this)">🗺 路线图</button>';
        html += '<button onclick="switchResTab(\'' + msgId + '\',\'tutorial\',this)">📖 教程</button>';
        html += '<button onclick="switchResTab(\'' + msgId + '\',\'exercise\',this)">✏️ 练习题</button>';
        html += '<button onclick="switchResTab(\'' + msgId + '\',\'mindmap\',this)">🧠 思维导图</button>';
        html += '</div>';

        html += '<div class="tab-section active" id="' + msgId + '_profile">' + md2html(data.profile || "") + '</div>';
        html += '<div class="tab-section" id="' + msgId + '_roadmap">' + md2html(data.roadmap || "") + '</div>';
        html += '<div class="tab-section" id="' + msgId + '_tutorial">' +
            (tutorialParts.length > 0 ? md2html(tutorialParts.join("\n\n")) : md2html(contentMD)) + '</div>';
        html += '<div class="tab-section" id="' + msgId + '_exercise">' +
            (exercisePart ? md2html(exercisePart) : "<p>练习题见教程部分</p>") + '</div>';
        html += '<div class="tab-section" id="' + msgId + '_mindmap">' +
            (mindmapPart ? md2html(mindmapPart) : "<p>思维导图见教程部分</p>") + '</div>';

        var wrapper = document.createElement("div");
        wrapper.className = "msg-row ai";
        wrapper.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble" style="max-width:100%;">' + html + '</div>';
        document.getElementById("chatArea").appendChild(wrapper);
    }

    // ========== 资源标签切换 ==========
    function switchResTab(msgId, tabName, btn) {
        var bubble = btn.parentElement.parentElement;
        bubble.querySelectorAll(".tabs-inline button").forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");
        bubble.querySelectorAll(".tab-section").forEach(function(s) { s.classList.remove("active"); });
        var target = bubble.querySelector("#" + msgId + "_" + tabName);
        if (target) target.classList.add("active");
    }

    // ========== Markdown → HTML ==========
    function md2html(md) {
        if (!md) return "<p>暂无内容</p>";
        var h = md.replace(/\r\n/g, "\n");

        var cbs = [];
        h = h.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
            var i = cbs.length;
            cbs.push("<pre><code>" + code.replace(/</g,"&lt;").replace(/>/g,"&gt;") + "</code></pre>");
            return "%%CB" + i + "%%";
        });

        h = h.replace(/`([^`]+)`/g, "<code>$1</code>");
        h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

        h = h.replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/g, function(m, header, rows) {
            var t = "<table><thead><tr>";
            header.split("|").filter(function(c){return c.trim();}).forEach(function(c){t+="<th>"+c.trim()+"</th>";});
            t += "</tr></thead><tbody>";
            rows.split("\n").filter(function(r){return r.trim();}).forEach(function(r){
                t += "<tr>";
                r.split("|").filter(function(c){return c.trim();}).forEach(function(c){t+="<td>"+c.trim()+"</td>";});
                t += "</tr>";
            });
            return t + "</tbody></table>";
        });

        h = h.replace(/^#### (.+)$/gm, "<h4>$1</h4>");
        h = h.replace(/^### (.+)$/gm, "<h3>$1</h3>");
        h = h.replace(/^## (.+)$/gm, "<h2>$1</h2>");
        h = h.replace(/^- (.+)$/gm, "<li>$1</li>");
        h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, "<ul>$1</ul>");
        h = h.replace(/^---$/gm, "<hr>");
        h = h.replace(/\n\n/g, "</p><p>");
        h = h.replace(/\n/g, "<br>");
        h = "<p>" + h + "</p>";

        for (var i = 0; i < cbs.length; i++) { h = h.replace("%%CB" + i + "%%", cbs[i]); }
        return h;
    }

    function splitBySections(md) {
        var s = [], lines = md.split("\n"), t = "", b = [];
        for (var i = 0; i < lines.length; i++) {
            if (/^## [^#]/.test(lines[i])) {
                if (t || b.length > 0) s.push({title:t, body:b.join("\n").trim()});
                t = lines[i].replace(/^## /, ""); b = [];
            } else { b.push(lines[i]); }
        }
        if (t || b.length > 0) s.push({title:t, body:b.join("\n").trim()});
        return s;
    }

    function escapeHtml(text) {
        var d = document.createElement("div");
        d.textContent = text;
        return d.innerHTML.replace(/\n/g, "<br>");
    }

    // ========== 添加历史记录 ==========
    function addHistoryItem(topic) {
        var list = document.getElementById("historyList");
        var time = new Date();
        var timeStr = time.getHours() + ":" + String(time.getMinutes()).padStart(2, "0");
        var item = document.createElement("div");
        item.className = "history-item";
        item.onclick = function() { quickChat(topic); };
        item.innerHTML = '<div class="h-time">' + timeStr + '</div><div class="h-text">' + escapeHtml(topic) + '</div>';
        list.insertBefore(item, list.firstChild);
    }

    function scrollToBottom() {
        var ca = document.getElementById("chatArea");
        setTimeout(function() { ca.scrollTop = ca.scrollHeight; }, 100);
    }

    // ========== 回车发送 ==========
    document.getElementById("msgInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
